<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <style>
      body {
        background-color: #f2f2f2; /* light grey */
        display: flex;
        justify-content: center; /* horizontal center */
        align-items: flex-start; /* top */
        height: 100vh;
        margin: 0;
        padding-top: 40px; /* space from top */
      }

      .container {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Simple Calculator</h2>

      <label for="num1">Num 1:</label>
      <input type="number" id="num1" placeholder="Enter num1" />
      <br /><br />

      <label for="num2">Num 2:</label>
      <input type="number" id="num2" placeholder="Enter num2" />
      <br /><br />

      <button onclick="addcalculate()">Calculate (ADD)</button>
      <button onclick="subcalculate()">Calculate (SUB)</button>

      <h3 id="result"></h3>
    </div>

    <script>
      async function addcalculate() {
        const num1 = document.getElementById("num1").value;
        const num2 = document.getElementById("num2").value;

        const res = await fetch("/api/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ num1, num2 }),
        });

        const data = await res.json();
        document.getElementById("result").innerText = "Result: " + data.result;
      }

      async function subcalculate() {
        const num1 = document.getElementById("num1").value;
        const num2 = document.getElementById("num2").value;

        const res = await fetch("/api/sub", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ num1, num2 }),
        });

        const data = await res.json();
        document.getElementById("result").innerText = "Result: " + data.result;
      }
    </script>
  </body>
</html>
